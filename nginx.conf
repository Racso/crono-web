server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;
    charset utf-8;

    types {
        text/html                   html htm;
        text/css                    css;
        application/javascript      js;
        text/plain                  txt md;
        image/svg+xml               svg svgz;
        image/png                   png;
        image/jpeg                  jpg jpeg;
        image/gif                   gif;
        image/x-icon                ico;
        application/json            json;
        font/woff                   woff;
        font/woff2                  woff2;
    }

    location / {
        try_files $uri $uri.html =404;
    }
}
